<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="1040" viewBox="0 0 1040 1040" role="img" aria-labelledby="title desc">
  <title id="title">Arduino servo code screenshot</title>
  <desc id="desc">A dark code screenshot showing Arduino code that reads a serial angle value and drives a servo.</desc>
  <rect width="1040" height="1040" fill="#1f262b" />
  <rect x="0" y="0" width="1040" height="8" fill="#2b3338" />
  <g font-family="'Cascadia Code', 'Consolas', monospace" font-size="26" xml:space="preserve">
    <text x="0" y="36" fill="#c586c0">#include <tspan fill="#9cdcfe">&lt;Servo.h&gt;</tspan></text>

    <text x="0" y="108" fill="#f5f5f5">Servo fingerServo;</text>
    <text x="0" y="146"><tspan fill="#00b7c3">int</tspan><tspan fill="#f5f5f5"> currentAngle = </tspan><tspan fill="#4fc1ff">0</tspan><tspan fill="#f5f5f5">;</tspan></text>

    <text x="0" y="224"><tspan fill="#00b7c3">void</tspan><tspan fill="#ffb02e"> setup</tspan><tspan fill="#f5f5f5">() {</tspan></text>
    <text x="32" y="262"><tspan fill="#ffb02e">Serial.begin</tspan><tspan fill="#f5f5f5">(</tspan><tspan fill="#4fc1ff">9600</tspan><tspan fill="#f5f5f5">);</tspan></text>
    <text x="32" y="300"><tspan fill="#ffb02e">Serial.setTimeout</tspan><tspan fill="#f5f5f5">(</tspan><tspan fill="#4fc1ff">25</tspan><tspan fill="#f5f5f5">);</tspan></text>
    <text x="32" y="338"><tspan fill="#ffb02e">fingerServo.attach</tspan><tspan fill="#f5f5f5">(</tspan><tspan fill="#4fc1ff">9</tspan><tspan fill="#f5f5f5">);</tspan><tspan fill="#8f9b8f">  // change pin if needed</tspan></text>
    <text x="32" y="376"><tspan fill="#ffb02e">fingerServo.write</tspan><tspan fill="#f5f5f5">(</tspan><tspan fill="#4fc1ff">0</tspan><tspan fill="#f5f5f5">);</tspan></text>
    <text x="0" y="414" fill="#f5f5f5">}</text>

    <text x="0" y="488"><tspan fill="#00b7c3">void</tspan><tspan fill="#ffb02e"> loop</tspan><tspan fill="#f5f5f5">() {</tspan></text>
    <text x="32" y="526"><tspan fill="#c586c0">if</tspan><tspan fill="#f5f5f5"> (</tspan><tspan fill="#ffb02e">Serial.available</tspan><tspan fill="#f5f5f5">() &gt; </tspan><tspan fill="#4fc1ff">0</tspan><tspan fill="#f5f5f5">) {</tspan></text>
    <text x="64" y="564"><tspan fill="#f5f5f5">String line = </tspan><tspan fill="#ffb02e">Serial.readStringUntil</tspan><tspan fill="#f5f5f5">('</tspan><tspan fill="#9cdcfe">\n</tspan><tspan fill="#f5f5f5">');</tspan></text>
    <text x="64" y="602"><tspan fill="#ffb02e">line.trim</tspan><tspan fill="#f5f5f5">();</tspan></text>

    <text x="64" y="678"><tspan fill="#c586c0">if</tspan><tspan fill="#f5f5f5"> (</tspan><tspan fill="#ffb02e">line.length</tspan><tspan fill="#f5f5f5">() &gt; </tspan><tspan fill="#4fc1ff">0</tspan><tspan fill="#f5f5f5">) {</tspan></text>
    <text x="96" y="716"><tspan fill="#00b7c3">int</tspan><tspan fill="#f5f5f5"> angle = </tspan><tspan fill="#ffb02e">line.toInt</tspan><tspan fill="#f5f5f5">();</tspan></text>
    <text x="96" y="754"><tspan fill="#f5f5f5">angle = </tspan><tspan fill="#ffb02e">constrain</tspan><tspan fill="#f5f5f5">(angle, </tspan><tspan fill="#4fc1ff">0</tspan><tspan fill="#f5f5f5">, </tspan><tspan fill="#4fc1ff">180</tspan><tspan fill="#f5f5f5">);</tspan></text>
    <text x="96" y="792" fill="#f5f5f5">currentAngle = angle;</text>

    <text x="96" y="870"><tspan fill="#ffb02e">fingerServo.write</tspan><tspan fill="#f5f5f5">(currentAngle);</tspan></text>
    <text x="96" y="908"><tspan fill="#ffb02e">Serial.println</tspan><tspan fill="#f5f5f5">(currentAngle);</tspan></text>
    <text x="64" y="946" fill="#f5f5f5">}</text>
    <text x="32" y="984" fill="#f5f5f5">}</text>
    <text x="0" y="1022" fill="#f5f5f5">}</text>
  </g>
  <g stroke="#4d575c" stroke-width="2" opacity="0.9">
    <line x1="2" y1="235" x2="2" y2="414" />
    <line x1="2" y1="499" x2="2" y2="1022" />
    <line x1="34" y1="537" x2="34" y2="984" />
    <line x1="66" y1="689" x2="66" y2="946" />
    <line x1="98" y1="727" x2="98" y2="908" />
  </g>
</svg>
